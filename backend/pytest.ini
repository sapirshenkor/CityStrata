[pytest]
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (GIS/ML-heavy; excluded from default run)
    integration: marks tests that need a real database (opt-in only)
filterwarnings =
    ignore::DeprecationWarning

# Default: fast unit + API tests only (no slow/integration).
addopts = -m "not slow and not integration"
